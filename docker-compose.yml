services:
  api:
    build:
      context: .
      dockerfile: InovaGAB.API/Dockerfile
    container_name: inovagab-api
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER:-InovaGAB.API}
      - Jwt__Audience=${JWT_AUDIENCE:-InovaGAB.App}